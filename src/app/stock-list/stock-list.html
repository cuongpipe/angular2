<h2>Stock List</h2>

<div class="stock-list-container">
    <div class="stock-list-container">
        @for (s of stocks; track s.code) {
            <app-stock-items 
                [stock]="s" 
                (toggleFavorite) = "onToggleFavorite($event)"
                (deleteStock)="onDeleteStock($event)"
                (updateStock)="onUpdateStock($event)"
                
                >
            </app-stock-items>
        }
    </div>
    <!-- 
track: Giúp Angular nhận diện chính xác từng item
để tăng tốc độ và tránh vẽ lại giao diện không cần thiết.
 -->
</div>
