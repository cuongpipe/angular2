<ng-container>
  <td>{{ stock.name }}</td>
  <td>{{ stock.code }}</td>
  <td 
    [class.positive]="isPositive()"
    [class.negative]="!isPositive()">
    {{stock.price}}
  </td>
  <td>{{ stock.exchange }}</td>
  <td>
    <button (click)="onToggleFavorite()">
      {{ stock.favorite ? 'Renove to favorite' : 'Add to Favorite' }}
    </button>
  </td>
  <td>
    <button (click)="onView()">View Details</button>
    <button (click)="onUpdate()">Update</button>
    <button (click)="onDelete()">Delete</button>
  </td>
</ng-container>
